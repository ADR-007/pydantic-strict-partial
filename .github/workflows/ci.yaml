name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

jobs:

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - python-version: "3.10"
            toxenv: "py310-pydantic2.6"
          - python-version: "3.11"
            toxenv: "py311-pydantic2.6"
          - python-version: "3.12"
            toxenv: "py312-pydantic2.6"
          - python-version: "3.12"
            toxenv: "py312-pydantic2.x"
          - python-version: "3.13"
            toxenv: "py313-pydantic2.x"
          - python-version: "3.14"
            toxenv: "py314-pydantic2.x"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup python for test Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install tox with tox-uv
        run: uv tool install tox --with tox-uv

      - name: Run test suite
        run: tox run -e ${{ matrix.toxenv }}

  lint:
    name: lint (3.14)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup python for test Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install tox with tox-uv
        run: uv tool install tox --with tox-uv

      - name: Run test suite
        run: tox run -e lint

  coverage:
    name: coverage (3.14)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup python for test Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install tox with tox-uv
        run: uv tool install tox --with tox-uv

      - name: Run test suite
        run: tox run -e coverage

      - uses: actions/upload-artifact@v4
        with:
          name: coverage_report
          path: ./reports

  coverage-report:
    name: coverage report
    needs:
      - coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coverage_report
          path: reports

      - name: Produce the coverage report
        uses: insightsengineering/coverage-action@v2
        with:
          # Path to the Cobertura XML report.
          path: ./reports/coverage.xml
          # Minimum total coverage, if you want to the
          # workflow to enforce it as a standard.
          # This has no effect if the `fail` arg is set to `false`.
          threshold: 99 # Temporary set to 50%. Should be 95%.

          # Fail the workflow if the minimum code coverage
          # reuqirements are not satisfied.
          fail: false
          # Publish the rendered output as a PR comment
          publish: true
          # Create a coverage diff report.
          diff: true
          # Branch to diff against.
          # Compare the current coverage to the coverage
          # determined on this branch.
          diff-branch: main
          # This is where the coverage reports for the
          # `diff-branch` are stored.
          # Branch is created if it doesn't already exist'.
          diff-storage: _xml_coverage_reports
          # Fail the action if any new uncovered statements are introduced compared to the diff-branch.
          coverage-reduction-failure: false

          togglable-report: true
